<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0f14"/>
      <stop offset="100%" style="stop-color:#111820"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8903a"/>
      <stop offset="100%" style="stop-color:#f5b942"/>
    </linearGradient>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="cupClip">
      <path d="M85 140 L108 290 L292 290 L315 140 Z"/>
    </clipPath>
  </defs>

  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Cup body -->
  <path d="M85 140 L108 290 L292 290 L315 140 Z"
        fill="none" stroke="#e8903a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Rim -->
  <line x1="85" y1="140" x2="315" y2="140" stroke="#e8903a" stroke-width="2.5"/>

  <!-- Coffee pool -->
  <path d="M103 258 L108 290 L292 290 L297 258 Z"
        fill="#c87941" opacity="0.4" clip-path="url(#cupClip)"/>
  <line x1="103" y1="258" x2="297" y2="258" stroke="#d4944a" stroke-width="1" opacity="0.5"/>

  <!-- Saucer -->
  <line x1="72" y1="297" x2="328" y2="297" stroke="#e8903a" stroke-width="2.5"/>

  <!-- Handle -->
  <path d="M310 175 C352 175 352 255 297 255"
        fill="none" stroke="#e8903a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Steam wisps -->
  <g stroke="#8ab4d4" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M155 133 Q147 112 155 101 Q163 90 155 70">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="M155 133 Q147 112 155 101 Q163 90 155 70;
                M155 133 Q163 112 155 101 Q147 90 155 70;
                M155 133 Q147 112 155 101 Q163 90 155 70"/>
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite"
        values="0.6;0.15;0.6"/>
    </path>
    <path d="M200 133 Q192 112 200 101 Q208 90 200 70">
      <animate attributeName="d" dur="3.6s" repeatCount="indefinite"
        values="M200 133 Q192 112 200 101 Q208 90 200 70;
                M200 133 Q208 112 200 101 Q192 90 200 70;
                M200 133 Q192 112 200 101 Q208 90 200 70"/>
      <animate attributeName="opacity" dur="3.6s" repeatCount="indefinite"
        values="0.6;0.1;0.6"/>
    </path>
    <path d="M245 133 Q237 112 245 101 Q253 90 245 70">
      <animate attributeName="d" dur="2.8s" repeatCount="indefinite"
        values="M245 133 Q237 112 245 101 Q253 90 245 70;
                M245 133 Q253 112 245 101 Q237 90 245 70;
                M245 133 Q237 112 245 101 Q253 90 245 70"/>
      <animate attributeName="opacity" dur="2.8s" repeatCount="indefinite"
        values="0.5;0.12;0.5"/>
    </path>
  </g>

  <!-- Code: no xml:space, no whitespace inside text elements -->
  <g font-family="'Courier New', monospace" font-size="13" clip-path="url(#cupClip)">
    <text x="116" y="178"><tspan fill="#c87941">String</tspan><tspan fill="#8ab4d4"> brew</tspan><tspan fill="#5a7a9f">() {</tspan></text>
    <text x="116" y="197"><tspan fill="#c87941" dx="15.6">Cup</tspan><tspan fill="#c8c8c8"> c</tspan><tspan fill="#5a7a9f"> = new </tspan><tspan fill="#c87941">Cup</tspan><tspan fill="#5a7a9f">();</tspan></text>
    <text x="116" y="216"><tspan fill="#7a9abf" dx="15.6">if </tspan><tspan fill="#5a7a9f">(</tspan><tspan fill="#c8c8c8">c.temp</tspan><tspan fill="#e05a5a"> ==</tspan><tspan fill="#98c87a"> "hot"</tspan><tspan fill="#5a7a9f">) {</tspan></text>
    <text x="116" y="235"><tspan fill="#7a9abf" dx="31.2">return</tspan><tspan fill="#c8c8c8"> c</tspan><tspan fill="#5a7a9f">.</tspan><tspan fill="#8ab4d4">drink</tspan><tspan fill="#5a7a9f">();</tspan></text>
    <text x="116" y="254"><tspan fill="#5a7a9f" dx="15.6">}</tspan></text>
  </g>

  <!-- Squiggle under c.temp == "hot" (contents of if parens) -->
  <path d="M163 219 Q167 215 171 219 Q175 223 179 219 Q183 215 187 219 Q191 223 195 219 Q199 215 203 219 Q207 223 211 219 Q215 215 219 219 Q223 223 227 219 Q231 215 235 219 Q239 223 243 219 Q247 215 251 219 Q255 223 259 219 Q263 215 267 219 Q271 223 275 219 Q279 215 280 219"
        stroke="#e8c84b" stroke-width="2" fill="none" opacity="0.95"/>

  <!-- JAVALINT -->
  <text x="200" y="338" font-family="'Georgia', 'Times New Roman', serif" font-size="36"
        font-weight="700" text-anchor="middle" fill="url(#amberGrad)"
        letter-spacing="4" filter="url(#glowAmber)">JAVALINT</text>

  <text x="200" y="362" font-family="'Courier New', monospace" font-size="11"
        text-anchor="middle" fill="#3d5570" letter-spacing="3">STATIC ANALYSIS TOOL</text>

</svg>
